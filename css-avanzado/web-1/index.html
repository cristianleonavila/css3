<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/fonts/fontawesome-free-6.1.2-web/css/all.min.css">
    <link rel="stylesheet" href="./assets/fonts/poppins/poppins.css">
    <link rel="stylesheet" href="./assets/css/reset.css">
    <link rel="stylesheet" href="./assets/css/styles.css">
    <title>Portafolio - Cristian Leon</title>
</head>

<body>
    <!-- Layout principal -->
    <div class="layout">
        <!-- Barra lateral (info usuario)-->
        <aside class="layout__aside">
            <section class="aside__user-info">
                <!-- Información General -->
                <div class="user-info__basic">
                    <div class="user-info__img-container">
                        <img src="assets/img/default-user.jpg" alt="User Image" class="user-info__image">
                    </div>
                    <h2 class="user-info__name">Cristian Leon</h2>
                    <h4 class="user-info__job">Full Stack Developer</h4>
                </div>
                <!-- Menú navegación -->
                <nav class="layout__menu">
                    <ul class="menu__list">
                        <li class="menu__item">
                            <a href="index.html" class="menu__link">
                                <i class="menu__icon fa-solid fa-house"></i>
                                <span class="menu__overlay">Home</span>
                            </a>
                        </li>
                        <li class="menu__item">
                            <a href="about.html" class="menu__link">
                                <i class="menu__icon fa-solid fa-user"></i>
                                <span class="menu__overlay">Sobre mí</span>
                            </a>                            
                        </li>
                        <li class="menu__item">
                            <a href="education.html" class="menu__link">
                                <i class="menu__icon fa-solid fa-graduation-cap"></i>
                                <span class="menu__overlay">Estudios</span>
                            </a>                            
                        </li>
                        <li class="menu__item">
                            <a href="portfolio.html" class="menu__link">
                                <i class="menu__icon fa-solid fa-briefcase"></i>
                                <span class="menu__overlay">Portafolio</span>
                            </a>                            
                        </li>
                        <li class="menu__item">
                            <a href="blog.html" class="menu__link">
                                <i class="menu__icon fa-solid fa-book"></i>
                                <span class="menu__overlay">Blog</span>
                            </a>                            
                        </li>    
                        <li class="menu__item">
                            <a href="blog.html" class="menu__link">
                                <i class="menu__icon fa-solid fa-envelope"></i>
                                <span class="menu__overlay">Contacto</span>
                            </a>                            
                        </li>                                             
                    </ul>
                </nav>
                <!-- Link redes sociales -->
                <div class="user-info__social">
                    <ul class="social__list">
                        <li class="social__items">
                            <a href="#" class="social__link">
                                <i class="social__icon fab fa-youtube"></i>
                            </a>
                        </li>
                        <li class="social__items">
                            <a href="#" class="social__link">
                                <i class="social__icon fab fa-linkedin"></i>
                            </a>
                        </li>
                        <li class="social__items">
                            <a href="#" class="social__link">
                                <i class="social__icon fab fa-instagram"></i>
                            </a>
                        </li>
                    </ul>
                </div>
                <!-- Botón descargar hv -->
                <div class="user-info__cv">
                    <a href="#" class="user-info__cv__button">Descargar</a>
                </div>
                <!-- Pié de página -->
                <footer class="layout__footer">
                    &copy; 2026 - Cristian Leon
                </footer>
            </section>
        </aside>
        <main class="layout__content">
            <section class="content__page">
                <h1 class="page__title">Cristian Leon</h1>
                <h2 class="page__subtitle">Desarrollador Full-Stack</h2>
            </section>
        </main>
    </div>

</html>
