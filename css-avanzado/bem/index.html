    <title>BEM</title>
</head>
<body>
    <h1>Metodología BEM (Block, Element, Modifier)</h1>  
    <section class="cards">
        <article class="cards__card">
            <h3 class="card__title">Tarjeta 1</h3>
            <p class="card__content">Contenido Tarjeta
                <span class="card__readmore">Leer más...</span>
            </p>
            <a href="#" class="card__link">test.com</a>
        </article>
        <article class="cards__card">
            <h3 class="card__title">Tarjeta 2</h3>
            <p class="card__content">Contenido Tarjeta</p>
            <a href="#" class="card__link card__link--red">test.com</a>
        </article>
        <article class="cards__card">
            <h3 class="card__title">Tarjeta 3</h3>
            <p class="card__content">Contenido Tarjeta</p>
            <a href="#" class="card__link">test.com</a>
        </article>
        <article class="cards__card">
            <h3 class="card__title">Tarjeta 4</h3>
            <p class="card__content">Contenido Tarjeta</p>
            <a href="#" class="card__link card__link--red">test.com</a>
        </article>                        
    </section>
